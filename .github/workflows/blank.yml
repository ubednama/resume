name: LaTeX Build and Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v2
      with:
        ref: main
      
    - name: Setup LaTeX environment
      run: |
        sudo apt-get update
        sudo apt-get install -y texlive-latex-extra texlive-fonts-recommended latexmk
      
    - name: Install biblatex package
      run: sudo apt-get install -y texlive-bibtex-extra
      
    - name: Compile LaTeX
      run: |
        latexmk -pdf -interaction=nonstopmode ./resume.tex 

    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        deploy_key: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./
